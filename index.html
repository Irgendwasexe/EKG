<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bildkonfigurator</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #0b1120;
      --surface-2: #111827;
      --border: #1f2937;
      --text: #eef2ff;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --success: #22c55e;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #102449, #020617 70%);
      color: var(--text);
      min-height: 100vh;
    }
    .container { max-width: 1120px; margin: 0 auto; padding: 48px 16px; }
    .panel {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(0,0,0,.45);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 22px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #0f172a;
      font-weight: 800;
    }
    .content { display: grid; grid-template-columns: 340px 1fr; }
    .sidebar {
      padding: 22px;
      background: var(--surface);
      border-right: 1px solid var(--border);
    }
    .sidebar h3, .preview h3 { margin: 0 0 12px; font-size: 1rem; }
    label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.9rem; }
    select, textarea, button, input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: var(--text);
      font-size: 0.95rem;
    }
    textarea { min-height: 250px; resize: vertical; font-family: ui-monospace, monospace; }
    button {
      cursor: pointer;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #082f49;
      font-weight: 700;
      border: none;
      transition: transform .1s ease;
    }
    button:hover { transform: translateY(-1px); }
    .button-row { display: flex; gap: 8px; margin-top: 10px; }
    .button-row button { flex: 1; }
    .preview { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
    .image-wrap {
      min-height: 460px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background:
        linear-gradient(45deg, rgba(15,23,42,.9), rgba(15,23,42,.6)),
        repeating-linear-gradient(45deg, transparent 0, transparent 10px, rgba(148,163,184,.06) 10px, rgba(148,163,184,.06) 20px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .image-wrap img {
      max-width: 100%;
      max-height: 460px;
      object-fit: contain;
      display: none;
    }
    .placeholder {
      color: var(--muted);
      text-align: center;
      padding: 32px;
      max-width: 420px;
    }
    .image-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .image-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }
    .thumb {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      overflow: hidden;
      cursor: pointer;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 6px;
    }
    .thumb img { width: 100%; height: 86px; object-fit: cover; display: block; margin-bottom: 6px; border-radius: 6px; }
    .thumb.active { border-color: var(--accent); background: #082f49; color: var(--text); }
    .status { font-size: 0.85rem; color: var(--muted); min-height: 1.2em; }
    @media (max-width: 900px) { .content { grid-template-columns: 1fr; } .sidebar { border-right: 0; border-bottom: 1px solid var(--border); } }
  </style>
</head>
<body>
  <div class="container">
    <section class="panel">
      <div class="topbar">Bildauswahl & Konfiguration</div>
      <div class="content">
        <aside class="sidebar">
          <h3>Konfiguration</h3>
          <label for="imageSelect">Aktives Bild</label>
          <select id="imageSelect"></select>

          <label for="configEditor">JSON-Konfiguration</label>
          <textarea id="configEditor"></textarea>

          <div class="button-row">
            <button id="applyConfig">Konfiguration übernehmen</button>
            <button id="downloadConfig">JSON herunterladen</button>
          </div>
          <div class="status" id="statusText"></div>
          <p style="font-size:0.85rem;color:var(--muted);margin-top:12px;">
            Lege Bilder in den Ordner <strong id="folderLabel">images</strong> ab und ändere hier, welches Bild angezeigt wird.
          </p>
        </aside>

        <main class="preview">
          <h3 id="previewTitle">Vorschau</h3>
          <div class="image-wrap">
            <img id="previewImage" alt="Vorschau" />
            <div class="placeholder" id="placeholderText">Kein Bild ausgewählt</div>
          </div>
          <div class="image-meta">
            <span id="imagePathText">Pfad: -</span>
            <span id="imageCountText">0 Bilder</span>
          </div>
          <div>
            <label for="thumbList">Verfügbare Bilder</label>
            <div class="image-list" id="thumbList"></div>
          </div>
        </main>
      </div>
    </section>
  </div>

  <script>
    const configPath = 'config.json';
    let config = null;

    const imageSelect = document.getElementById('imageSelect');
    const configEditor = document.getElementById('configEditor');
    const previewImage = document.getElementById('previewImage');
    const placeholderText = document.getElementById('placeholderText');
    const previewTitle = document.getElementById('previewTitle');
    const imagePathText = document.getElementById('imagePathText');
    const imageCountText = document.getElementById('imageCountText');
    const thumbList = document.getElementById('thumbList');
    const statusText = document.getElementById('statusText');
    const folderLabel = document.getElementById('folderLabel');

    function updateStatus(message, type = 'info') {
      statusText.textContent = message;
      statusText.style.color = type === 'error' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : 'var(--muted)';
    }

    function normalizeImagePath(fileName) {
      const folder = config?.imageFolder || 'images';
      return `${folder.replace(/\/$/, '')}/${fileName.replace(/^\//, '')}`;
    }

    function setPreview(item) {
      const path = normalizeImagePath(item.name);
      previewTitle.textContent = item.title || item.name;
      imagePathText.textContent = `Pfad: ${path}`;
      previewImage.src = path;
      previewImage.style.display = 'block';
      placeholderText.style.display = 'none';
      previewImage.onerror = () => {
        previewImage.style.display = 'none';
        placeholderText.style.display = 'block';
        placeholderText.textContent = `Bild konnte nicht geladen werden: ${path}`;
      };
    }

    function renderImages() {
      if (!config || !Array.isArray(config.images)) return;
      imageSelect.innerHTML = '';
      thumbList.innerHTML = '';
      folderLabel.textContent = config.imageFolder || 'images';

      config.images.forEach((item) => {
        const option = document.createElement('option');
        option.value = item.name;
        option.textContent = item.title || item.name;
        imageSelect.appendChild(option);

        const thumb = document.createElement('button');
        thumb.className = 'thumb';
        thumb.type = 'button';
        thumb.innerHTML = `<img src="${normalizeImagePath(item.name)}" alt="${item.title || item.name}" /><span>${item.title || item.name}</span>`;
        thumb.onclick = () => {
          config.defaultImage = item.name;
          imageSelect.value = item.name;
          setPreview(item);
          updateStatus(`Bild ausgewählt: ${item.name}`, 'success');
        };
        thumbList.appendChild(thumb);
      });

      imageCountText.textContent = `${config.images.length} Bilder`;
      const active = config.images.find(item => item.name === config.defaultImage) || config.images[0];
      if (active) {
        imageSelect.value = active.name;
        setPreview(active);
      }
    }

    async function loadConfig() {
      try {
        const response = await fetch(configPath, { cache: 'no-store' });
        if (!response.ok) throw new Error('Konfigurationsdatei konnte nicht geladen werden');
        config = await response.json();
        if (!config.images || !Array.isArray(config.images)) {
          config.images = [];
        }
        if (!config.imageFolder) config.imageFolder = 'images';
        configEditor.value = JSON.stringify(config, null, 2);
        renderImages();
        updateStatus('Konfiguration geladen', 'success');
      } catch (error) {
        config = { imageFolder: 'images', defaultImage: '', images: [] };
        configEditor.value = JSON.stringify(config, null, 2);
        placeholderText.textContent = 'config.json konnte nicht geladen werden. Bitte prüfe den Dateipfad.';
        updateStatus(error.message, 'error');
      }
    }

    document.getElementById('applyConfig').addEventListener('click', () => {
      try {
        const updated = JSON.parse(configEditor.value);
        if (!updated.images || !Array.isArray(updated.images)) {
          throw new Error('images muss ein Array sein');
        }
        if (!updated.imageFolder) updated.imageFolder = 'images';
        if (!updated.defaultImage && updated.images.length > 0) {
          updated.defaultImage = updated.images[0].name;
        }
        config = updated;
        configEditor.value = JSON.stringify(config, null, 2);
        renderImages();
        updateStatus('Konfiguration übernommen', 'success');
      } catch (error) {
        updateStatus('Ungültige JSON-Konfiguration: ' + error.message, 'error');
      }
    });

    document.getElementById('downloadConfig').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'config.json';
      link.click();
      URL.revokeObjectURL(link.href);
      updateStatus('JSON-Datei heruntergeladen', 'success');
    });

    imageSelect.addEventListener('change', () => {
      const selected = config.images.find(item => item.name === imageSelect.value);
      if (selected) {
        config.defaultImage = selected.name;
        setPreview(selected);
        updateStatus(`Aktives Bild: ${selected.name}`, 'success');
      }
    });

    loadConfig();
  </script>
</body>
</html>
